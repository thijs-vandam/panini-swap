<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Troca Cromos Oeiras</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <h1 data-i18n="siteTitle">Troca Cromos Oeiras</h1>
  <nav>
    <a href="index.html" data-i18n="navFind">Encontrar Trocas</a>
    <a href="adicionar.html" data-i18n="navAdd">Adicionar a Minha Lista</a>
  </nav>
  <div class="lang-toggle">
    <button data-lang-btn="pt">PT</button>
    <button data-lang-btn="en">EN</button>
  </div>
</header>
<main>
  <p class="counter" id="counter">…</p>
  <p data-i18n="tagline" style="margin-bottom:1.5rem;text-align:center;color:#64748b"></p>

  <div class="card">
    <div id="grid-container"></div>
    <button class="btn btn-primary" id="find-btn" data-i18n="findBtn">Encontrar Trocas</button>
  </div>

  <div id="results"></div>

  <!-- Swap request modal -->
  <div id="modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:center;justify-content:center">
    <div class="card" style="max-width:400px;width:90%">
      <h2 style="margin-bottom:1rem" data-i18n="requestBtn">Pedir Troca</h2>
      <label data-i18n="fieldName">Primeiro nome</label>
      <input id="req-name" type="text" maxlength="30">
      <label data-i18n="fieldEmail">Email dos pais</label>
      <input id="req-email" type="email">
      <label data-i18n="fieldHood">Bairro</label>
      <input id="req-hood" type="text">
      <div id="modal-msg"></div>
      <div style="display:flex;gap:.5rem;margin-top:.5rem">
        <button class="btn btn-primary" id="modal-send-btn" data-i18n="requestBtn">Pedir Troca</button>
        <button class="btn" style="background:var(--border)" id="modal-cancel-btn">✕</button>
      </div>
    </div>
  </div>

  <hr style="margin:2rem 0">

  <!-- Re-send link section -->
  <div class="card">
    <h2 data-i18n="resendTitle" style="margin-bottom:.5rem">Já tens lista?</h2>
    <p data-i18n="resendDesc" style="margin-bottom:.75rem;color:var(--muted);font-size:.9rem"></p>
    <input id="resend-email" type="email" data-i18n-placeholder="fieldEmail">
    <div id="resend-msg"></div>
    <button class="btn btn-primary" id="resend-btn" data-i18n="resendBtn">Enviar link</button>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="config.js"></script>
<script src="translations.js"></script>
<script src="js/i18n.js"></script>
<script src="js/grid.js"></script>
<script src="js/matchmaking.js"></script>
<script src="js/api.js"></script>
<script src="js/app.js"></script>
</body>
</html>
